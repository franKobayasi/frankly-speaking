name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install --verbose 2>&1 | tail -50

      - name: Build
        run: |
          echo "=== Starting build ==="
          npm run build 2>&1
          echo "=== Build complete ==="

      - name: Show output
        run: ls -la out/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
